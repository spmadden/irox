[package]
name = "irox-geometry"
description = "2D and 3D Geometry Primitives"
keywords = ["irox"]
categories = ["data-structures", "mathematics", "science::geo"]
version= "0.1.0"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
license.workspace = true
exclude.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[features]
default = []
alloc = ["irox-tools/alloc", "irox-units/alloc"]
std = ["irox-tools/std", "irox-units/std"]
egui = ["dep:egui"]

[dependencies]
irox-tools = {workspace = true}
irox-units = {workspace = true}
egui = {workspace = true, default-features = false, optional = true}

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
