[package]
name = "irox-log"
description = "Basic console and file logging"
keywords = ["irox", "log", "console"]
categories = ["command-line-interface", "development-tools::debugging"]
version = "0.2.3"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
license.workspace = true
exclude.workspace = true
repository.workspace = true
readme = "README.md"

[features]
default = []
alloc = ["irox-tools/alloc"]
std = ["irox-time/std", "irox-tools/std", "alloc"]

[lints]
workspace = true

[dependencies]
log = { workspace = true }
irox-tools = { workspace = true }
irox-time = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
